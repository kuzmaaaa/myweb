<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>计算器</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="计算器">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71403.png">

<style>
  /* 基础清理与防误触 */
  * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    /* 关键：100dvh 完美适配 Safari 动态地址栏 */
    height: 100dvh; 
    background: #000;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    /* 底部额外留白，避开工具栏和小黑条 */
    padding: env(safe-area-inset-top) 4vw calc(env(safe-area-inset-bottom) + 3vh) 4vw;
    touch-action: none;
  }

  /* 上方数字显示区：占满剩余所有空间 */
  .disp-container {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    width: 100%;
    padding-bottom: 2vh;
  }

  .disp {
    color: #fff;
    font-size: 20vw;
    font-weight: 300;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    width: 100%;
  }

  /* 下方按键区：固定结构，防止溢出 */
  .calc-wrapper {
    width: 100%;
    /* 强制限制最大高度，防止把下面的按钮挤出屏幕 */
    max-height: 60dvh; 
  }

  .btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    /* 行间距和列间距 */
    gap: 2.5vh 3.5vw; 
  }

  button {
    width: 100%;
    /* 保证按键在各种屏幕下都不会太高或太扁 */
    height: clamp(50px, 10dvh, 90px);
    border: none;
    border-radius: 500px;
    font-size: clamp(24px, 4.5dvh, 40px);
    color: #fff;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #333;
  }

  .g { background: #a5a5a5; color: #000; }
  .o { background: #ff9500; }
  
  /* 0 键横跨两格 */
  .z { 
    grid-column: span 2; 
    justify-content: flex-start; 
    padding-left: 8vw; 
  }

  button:active { background: #737373; }
  .o:active { background: #ffcc80; }
</style>
</head>

<body oncontextmenu="return false;">
  <div class="disp-container">
    <div class="disp" id="disp">0</div>
  </div>
  
  <div class="calc-wrapper">
    <div class="btns">
      <button class="g" ontouchstart="reset()">AC</button>
      <button class="g" ontouchstart="neg()">+/-</button>
      <button class="g" ontouchstart="pct()">%</button>
      <button class="o" ontouchstart="op('/')">÷</button>

      <button class="d" ontouchstart="digit('7')">7</button>
      <button class="d" ontouchstart="digit('8')">8</button>
      <button class="d" ontouchstart="digit('9')">9</button>
      <button class="o" ontouchstart="op('×')">×</button>

      <button class="d" ontouchstart="digit('4')">4</button>
      <button class="d" ontouchstart="digit('5')">5</button>
      <button class="d" ontouchstart="digit('6')">6</button>
      <button class="o" ontouchstart="op('-')">-</button>

      <button class="d" ontouchstart="digit('1')">1</button>
      <button class="d" ontouchstart="digit('2')">2</button>
      <button class="d" ontouchstart="digit('3')">3</button>
      <button class="o" ontouchstart="op('+')">+</button>

      <button class="d z" ontouchstart="digit('0')">0</button>
      <button class="d" ontouchstart="digit('.')">.</button>

      <button class="o" ontouchstart="holdStart(event)" ontouchend="holdEnd(event)">＝</button>
    </div>
  </div>

<script>
let disp = document.getElementById('disp');
let display = '0';
let savedSum = null;
let holdTimer = null;
let isLongHold = false;

// 动态调整字体大小，防止溢出
function updateFontSize() {
  const len = display.length;
  if (len > 9) {
    disp.style.fontSize = '10vw';
  } else if (len > 6) {
    disp.style.fontSize = '15vw';
  } else {
    disp.style.fontSize = '20vw';
  }
}

function show() {
  disp.textContent = display || '0';
  updateFontSize();
}

function digit(n) {
  if (display === '0' && n !== '.') display = n;
  else if (display.length < 15) display += n;
  show();
}

function reset() {
  display = '0';
  savedSum = null;
  isLongHold = false;
  show();
}

function neg() {
  if (display === '0') return;
  display = display.startsWith('-') ? display.slice(1) : '-' + display;
  show();
}

function pct() {
  let n = parseFloat(display);
  if (!isNaN(n)) {
    display = parseFloat((n / 100).toFixed(8)).toString();
    show();
  }
}

function op(operator) {
  if (/[+\-×÷]$/.test(display)) {
    display = display.slice(0,-1) + operator;
  } else {
    display += operator;
  }
  show();
}

function getDateNumber() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate().toString().padStart(2, '0');
  const h = now.getHours().toString().padStart(2, '0');
  const min = now.getMinutes().toString().padStart(2, '0');
  return parseInt(`${m}${d}${h}${min}`, 10);
}

// 核心的长按触发逻辑（保持原样）
function holdStart(e) {
  e.preventDefault();
  isLongHold = false;
  holdTimer = setTimeout(() => {
    isLongHold = true;
    if (savedSum !== null) {
      const dateNum = getDateNumber();
      const diff = dateNum - savedSum;
      display = `${savedSum} + ${diff}`;
      show();
    }
  }, 800);
}

function holdEnd(e) {
  e.preventDefault();
  clearTimeout(holdTimer);
  
  if (isLongHold) {
    isLongHold = false;
    return;
  }

  if (savedSum === null) {
    try {
      let result = eval(display.replace(/×/g,'*').replace(/÷/g,'/'));
      if (Number.isFinite(result)) {
        display = Math.round(result).toString();
        savedSum = Math.round(result);
        show();
      }
    } catch {
      display = '错误';
      show();
    }
  } else {
    display = getDateNumber().toString();
    show();
  }
}

// 彻底禁止多指缩放和双击缩放，防止手势干扰
document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
document.addEventListener('dblclick', function(e) { e.preventDefault(); });

show();
</script>
</body>
</html>
