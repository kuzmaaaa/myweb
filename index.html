<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>计算器</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    /* 使用 dvh 确保在移动端浏览器弹出工具栏时也能精准适配 */
    height: 100dvh;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* 均匀分布显示区和按键区 */
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    padding: env(safe-area-inset-top) 5vw env(safe-area-inset-bottom) 5vw;
    touch-action: none;
  }

  /* 显示区域：占据屏幕上半部分，自动缩放 */
  .disp-container {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    width: 100%;
    padding-bottom: 2vh;
  }

  .disp {
    color: #fff;
    /* 使用 clamp 限制字体大小，最小 40px，最大 80px，随高度变化 */
    font-size: clamp(40px, 12vh, 85px);
    font-weight: 300;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    width: 100%;
    /* 数字太长时从右向左显示 */
    direction: ltr; 
  }

  /* 按键区域容器 */
  .calc-wrapper {
    width: 100%;
    /* 核心修改：按键区最高只占屏幕的 65%，防止把屏幕撑爆 */
    max-height: 65dvh;
    padding-bottom: 10px;
  }

  .btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    /* 间距随屏幕高度缩放 */
    gap: 1.5vh 3vw; 
  }

  button {
    width: 100%;
    /* 核心修改：按钮高度随屏幕高度动态变化，确保垂直方向不溢出 */
    height: clamp(50px, 11vh, 85px); 
    border: none;
    border-radius: 500px; /* 使用大圆角替代 50%，适配椭圆 */
    font-size: clamp(20px, 4vh, 32px);
    color: #fff;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: manipulation;
  }

  .g { background: #a5a5a5; color: #000; }
  .d { background: #333; }
  .o { background: #ff9500; }

  /* 0 按钮适配：横跨两列 */
  .z {
    grid-column: span 2;
    justify-content: flex-start;
    padding-left: 8vw;
  }

  /* 点击效果 */
  button:active { background: #737373; }
  .o:active { background: #ffcc80; }
</style>
</head>

<body oncontextmenu="return false;">
  <div class="disp-container">
    <div class="disp" id="disp">0</div>
  </div>
  
  <div class="calc-wrapper">
    <div class="btns">
      <button class="g" ontouchstart="reset()">AC</button>
      <button class="g" ontouchstart="neg()">+/-</button>
      <button class="g" ontouchstart="pct()">%</button>
      <button class="o" ontouchstart="op('/')">÷</button>

      <button class="d" ontouchstart="digit('7')">7</button>
      <button class="d" ontouchstart="digit('8')">8</button>
      <button class="d" ontouchstart="digit('9')">9</button>
      <button class="o" ontouchstart="op('×')">×</button>

      <button class="d" ontouchstart="digit('4')">4</button>
      <button class="d" ontouchstart="digit('5')">5</button>
      <button class="d" ontouchstart="digit('6')">6</button>
      <button class="o" ontouchstart="op('-')">-</button>

      <button class="d" ontouchstart="digit('1')">1</button>
      <button class="d" ontouchstart="digit('2')">2</button>
      <button class="d" ontouchstart="digit('3')">3</button>
      <button class="o" ontouchstart="op('+')">+</button>

      <button class="d z" ontouchstart="digit('0')">0</button>
      <button class="d" ontouchstart="digit('.')">.</button>

      <button class="o" id="eq" ontouchstart="holdStart(event)" ontouchend="holdEnd(event)">＝</button>
    </div>
  </div>

<script>
let disp = document.getElementById('disp');
let display = '0';
let savedSum = null;
let holdTimer = null;
let isLongHold = false;

// 动态调整数字字体大小：输入越多，字越小
function updateFontSize() {
  const len = display.length;
  if (len > 9) {
    disp.style.fontSize = 'clamp(24px, 6vh, 40px)';
  } else if (len > 6) {
    disp.style.fontSize = 'clamp(30px, 8vh, 55px)';
  } else {
    disp.style.fontSize = 'clamp(40px, 12vh, 85px)';
  }
}

function show() {
  disp.textContent = display || '0';
  updateFontSize();
}

function digit(n) {
  if (display === '0' && n !== '.') display = n;
  // 限制最大输入长度，防止溢出屏幕
  else if (display.length < 15) display += n;
  show();
}

function reset() {
  display = '0';
  savedSum = null;
  isLongHold = false;
  show();
}

function neg() {
  if (display === '0') return;
  display = display.startsWith('-') ? display.slice(1) : '-' + display;
  show();
}

function pct() {
  let n = parseFloat(display);
  if (!isNaN(n)) {
    display = parseFloat((n / 100).toFixed(8)).toString();
    show();
  }
}

function op(operator) {
  if (/[+\-×÷]$/.test(display)) {
    display = display.slice(0,-1) + operator;
  } else {
    display += operator;
  }
  show();
}

function getDateNumber() {
  const now = new Date();
  return parseInt(`${now.getMonth() + 1}${now.getDate().toString().padStart(2, '0')}${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`, 10);
}

function holdStart(e) {
  e.preventDefault();
  isLongHold = false;
  holdTimer = setTimeout(() => {
    isLongHold = true;
    if (savedSum !== null) {
      display = `${savedSum} + ${getDateNumber() - savedSum}`;
      show();
    }
  }, 800);
}

function holdEnd(e) {
  e.preventDefault();
  clearTimeout(holdTimer);
  if (isLongHold) { isLongHold = false; return; }

  if (savedSum === null) {
    try {
      let result = eval(display.replace(/×/g,'*').replace(/÷/g,'/'));
      if (Number.isFinite(result)) {
        display = Math.round(result).toString();
        savedSum = Math.round(result);
        show();
      }
    } catch {
      display = '错误';
      show();
    }
  } else {
    display = getDateNumber().toString();
    show();
  }
}

document.addEventListener('gesturestart', (e) => e.preventDefault());
show();
</script>
</body>
</html>
