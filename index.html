<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>计算器</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100dvh;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* 按钮靠底 */
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    padding-bottom: env(safe-area-inset-bottom); /* 避开底部横条 */
    touch-action: none;
  }

  /* 数字显示区域 */
  .disp {
    flex: 1; /* 自动占据上方所有剩余空间 */
    color: #fff;
    font-size: 20vw; /* 随屏幕宽度缩放字体 */
    font-weight: 300;
    text-align: right;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 0 10% 5% 10%;
    white-space: nowrap;
    overflow: hidden;
  }

  /* 按键主容器 */
  .calc-container {
    width: 100%;
    padding: 0 4% 4% 4%; /* 左右留点边距，更像原生 */
  }

  .btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    /* 关键：使用 gap 控制紧凑度 */
    gap: 3vw; 
  }

  button {
    /* 改用宽度百分比作为高度，确保永远是圆的且不会撑破屏幕 */
    width: 100%;
    aspect-ratio: 1 / 1;
    border: none;
    border-radius: 50%;
    font-size: 8vw; /* 字体随屏幕缩放 */
    color: #fff;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: manipulation;
  }

  .g { background: #a5a5a5; color: #000; }
  .d { background: #333; }
  .o { background: #ff9500; }

  /* 0 按钮适配 */
  .z {
    grid-column: span 2;
    aspect-ratio: auto; 
    height: 100%; 
    border-radius: 100px;
    justify-content: flex-start;
    padding-left: 8vw;
  }

  button:active { background: #737373; }
  .o:active { background: #ffcc80; }
</style>
</head>

<body oncontextmenu="return false;">
  <div class="disp" id="disp">0</div>
  
  <div class="calc-container">
    <div class="btns">
      <button class="g" ontouchstart="reset()">AC</button>
      <button class="g" ontouchstart="neg()">+/-</button>
      <button class="g" ontouchstart="pct()">%</button>
      <button class="o" ontouchstart="op('/')">÷</button>

      <button class="d" ontouchstart="digit('7')">7</button>
      <button class="d" ontouchstart="digit('8')">8</button>
      <button class="d" ontouchstart="digit('9')">9</button>
      <button class="o" ontouchstart="op('×')">×</button>

      <button class="d" ontouchstart="digit('4')">4</button>
      <button class="d" ontouchstart="digit('5')">5</button>
      <button class="d" ontouchstart="digit('6')">6</button>
      <button class="o" ontouchstart="op('-')">-</button>

      <button class="d" ontouchstart="digit('1')">1</button>
      <button class="d" ontouchstart="digit('2')">2</button>
      <button class="d" ontouchstart="digit('3')">3</button>
      <button class="o" ontouchstart="op('+')">+</button>

      <button class="d z" ontouchstart="digit('0')">0</button>
      <button class="d" ontouchstart="digit('.')">.</button>

      <button class="o" id="eq"
        ontouchstart="holdStart(event)" 
        ontouchend="holdEnd(event)">＝</button>
    </div>
  </div>

<script>
let disp = document.getElementById('disp');
let display = '0';
let savedSum = null;
let holdTimer = null;
let isLongHold = false;

function show() {
  disp.textContent = display || '0';
  // 超过6位自动缩小字体
  if (display.length > 6) {
    disp.style.fontSize = '12vw';
  } else {
    disp.style.fontSize = '20vw';
  }
}

function digit(n) {
  if (display === '0' && n !== '.') display = n;
  else if (display.length < 9) display += n;
  show();
}

function reset() {
  display = '0';
  savedSum = null;
  isLongHold = false;
  show();
}

function neg() {
  if (display === '0') return;
  display = display.startsWith('-') ? display.slice(1) : '-' + display;
  show();
}

function pct() {
  let n = parseFloat(display);
  if (!isNaN(n)) {
    display = (n / 100).toString().substring(0, 9);
    show();
  }
}

function op(operator) {
  if (/[+\-×÷]$/.test(display)) {
    display = display.slice(0,-1) + operator;
  } else {
    display += operator;
  }
  show();
}

function getDateNumber() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate().toString().padStart(2, '0');
  const h = now.getHours().toString().padStart(2, '0');
  const min = now.getMinutes().toString().padStart(2, '0');
  return parseInt(`${m}${d}${h}${min}`, 10);
}

function holdStart(e) {
  e.preventDefault();
  isLongHold = false;
  holdTimer = setTimeout(() => {
    isLongHold = true;
    if (savedSum !== null) {
      const dateNum = getDateNumber();
      const diff = dateNum - savedSum;
      display = `${savedSum} + ${diff}`;
      show();
    }
  }, 800);
}

function holdEnd(e) {
  e.preventDefault();
  clearTimeout(holdTimer);
  if (isLongHold) {
    isLongHold = false;
    return;
  }

  if (savedSum === null) {
    try {
      let calcStr = display.replace(/×/g,'*').replace(/÷/g,'/');
      let result = eval(calcStr);
      if (Number.isFinite(result)) {
        display = Math.round(result).toString();
        savedSum = Math.round(result);
        show();
      }
    } catch {
      display = '错误';
      show();
    }
  } else {
    display = getDateNumber().toString();
    show();
  }
}

document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
</script>
</body>
</html>
