<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="author" content="xiaojiang">
<title>计算器</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="计算器">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71403.png">

<style>
  * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100dvh;
    background: #000;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 2vh) 0;
    touch-action: none;
  }

  .disp-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 0 6vw 2vh 6vw;
    width: 100%;
  }

  .history {
    color: #a5a5a5;
    font-size: 24px;
    min-height: 28px;
    margin-bottom: 8px;
    text-align: right;
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
  }

  .disp {
    color: #fff;
    font-size: 80px;
    font-weight: 300;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    width: 100%;
  }

  :root {
    --btn-size: min(21vw, 11.5dvh);
    --gap-size: min(3vw, 2dvh);
  }

  .calc-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-bottom: 2vh;
  }

  .btns {
    display: grid;
    grid-template-columns: repeat(4, var(--btn-size));
    grid-template-rows: repeat(5, var(--btn-size));
    gap: var(--gap-size);
  }

  button {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 50%;
    font-size: calc(var(--btn-size) * 0.45);
    color: #fff;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    outline: none;
    -webkit-appearance: none;
  }

  .g { background: #a5a5a5; color: #000; }
  .o { background: #ff9500; }

  .z {
    grid-column: span 2;
    width: 100%;
    border-radius: 100px;
    justify-content: flex-start;
    padding-left: calc(var(--btn-size) * 0.4);
  }

  button:active { background: #737373; }
  .o:active { background: #ffcc80; }
</style>
</head>

<body oncontextmenu="return false;">
  <div class="disp-container">
    <div class="history" id="history"></div>
    <div class="disp" id="disp">0</div>
  </div>
  
  <div class="calc-wrapper">
    <div class="btns">
      <button class="g" ontouchstart="reset()">AC</button>
      <button class="g" ontouchstart="neg()">+/-</button>
      <button class="g" ontouchstart="pct()">%</button>
      <button class="o" ontouchstart="op('/')">÷</button>

      <button class="d" ontouchstart="digit('7')">7</button>
      <button class="d" ontouchstart="digit('8')">8</button>
      <button class="d" ontouchstart="digit('9')">9</button>
      <button class="o" ontouchstart="op('×')">×</button>

      <button class="d" ontouchstart="digit('4')">4</button>
      <button class="d" ontouchstart="digit('5')">5</button>
      <button class="d" ontouchstart="digit('6')">6</button>
      <button class="o" ontouchstart="op('-')">-</button>

      <button class="d" ontouchstart="digit('1')">1</button>
      <button class="d" ontouchstart="digit('2')">2</button>
      <button class="d" ontouchstart="digit('3')">3</button>
      <button class="o" ontouchstart="op('+')">+</button>

      <button class="d z" ontouchstart="digit('0')">0</button>
      <button class="d" ontouchstart="digit('.')">.</button>

      <button class="o" ontouchstart="holdStart(event)" ontouchend="holdEnd(event)">＝</button>
    </div>
  </div>

<script>
let disp = document.getElementById('disp');
let historyDisp = document.getElementById('history');
let display = '0';
let savedSum = null;
let holdTimer = null;
let isLongHold = false;

// 点击数字复制功能保留
disp.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(display).then(() => {
      const originalColor = disp.style.color;
      disp.style.color = '#4ade80';
      setTimeout(() => { disp.style.color = originalColor; }, 150);
    });
  }
});

function updateFontSize() {
  const len = display.length;
  if (len > 9) disp.style.fontSize = '40px';
  else if (len > 6) disp.style.fontSize = '55px';
  else disp.style.fontSize = '80px';
}

function show() {
  disp.textContent = display || '0';
  updateFontSize();
}

function digit(n) {
  if (display === '0' && n !== '.') display = n;
  else if (display.length < 15) display += n;
  show();
}

function reset() {
  display = '0';
  historyDisp.textContent = '';
  savedSum = null;
  isLongHold = false;
  show();
}

function neg() {
  if (display === '0') return;
  display = display.startsWith('-') ? display.slice(1) : '-' + display;
  show();
}

function pct() {
  let n = parseFloat(display);
  if (!isNaN(n)) {
    display = parseFloat((n / 100).toFixed(8)).toString();
    show();
  }
}

function op(operator) {
  if (/[+\-×÷]$/.test(display)) {
    display = display.slice(0,-1) + operator;
  } else {
    display += operator;
  }
  show();
}

function getDateNumber() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate().toString().padStart(2, '0');
  const h = now.getHours().toString().padStart(2, '0');
  const min = now.getMinutes().toString().padStart(2, '0');
  return parseInt(`${m}${d}${h}${min}`, 10);
}

// 核心修改 1：长按逻辑恢复，只显示拼凑的公式
function holdStart(e) {
  e.preventDefault();
  isLongHold = false;
  holdTimer = setTimeout(() => {
    isLongHold = true;
    if (savedSum !== null) {
      const dateNum = getDateNumber();
      const diff = dateNum - savedSum;
      display = `${savedSum} + ${diff}`;
      historyDisp.textContent = ''; // 长按时把上面的小字清空，让注意力集中在大字上
      show();
    }
  }, 800);
}

// 核心修改 2：短按逻辑处理魔术揭晓
function holdEnd(e) {
  e.preventDefault();
  clearTimeout(holdTimer);
  
  if (isLongHold) {
    isLongHold = false;
    return; // 长按松开时不做任何事，保持屏幕上的公式
  }

  if (savedSum === null) {
    // 正常的短按等号计算
    try {
      let calcStr = display.replace(/×/g,'*').replace(/÷/g,'/');
      let result = eval(calcStr);
      if (Number.isFinite(result)) {
        historyDisp.textContent = display + ' =';
        display = Math.round(result).toString();
        savedSum = Math.round(result);
        show();
      }
    } catch {
      display = '错误';
      show();
    }
  } else {
    // 魔术揭晓：屏幕上已经是公式时，短按一次等号，显示出最终的时间数字
    historyDisp.textContent = display + ' ='; // 把刚才的公式移到上方变成小字
    display = getDateNumber().toString();     // 下方大字揭晓时间
    show();
  }
}

document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
document.addEventListener('dblclick', function(e) { e.preventDefault(); });

show();
</script>
</body>
</html>
