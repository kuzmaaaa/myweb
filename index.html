<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>计算器</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="计算器">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71403.png">

<style>
  /* 基础清理与防误触 */
  * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }

  /* 终极杀手锏：绝对锁定整个网页边界，根除所有高度溢出和拉伸错误 */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    position: fixed; 
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    touch-action: none;
  }

  /* 整体容器，安全区保护 */
  .app-container {
    width: 100%;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px) 16px;
  }

  /* 上方数字显示区：自动吸收所有剩余的垂直空间 */
  .disp-container {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding-bottom: 24px;
    min-height: 0; 
  }

  .disp {
    color: #fff;
    font-size: 80px; 
    font-weight: 300;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    width: 100%;
    transition: color 0.15s;
  }

  /* 下方按键区 */
  .btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    width: 100%;
  }

  button {
    width: 100%;
    /* 核心魔法：强制宽高比为 1:1，无论在哪种屏幕上永远是完美的正圆 */
    aspect-ratio: 1 / 1; 
    height: auto;
    border: none;
    border-radius: 50%;
    font-size: 36px;
    color: #fff;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    outline: none;
    -webkit-appearance: none;
  }

  .g { background: #a5a5a5; color: #000; }
  .o { background: #ff9500; }
  
  /* 0 键横向拉伸处理 */
  .z {
    grid-column: span 2;
    aspect-ratio: auto; 
    height: 100%;
    border-radius: 100px;
    justify-content: flex-start;
    padding-left: 30px; 
  }

  button:active { background: #737373; }
  .o:active { background: #ffcc80; }

  /* 针对超小屏幕手机（如 iPhone SE）的字号微调 */
  @media (max-width: 380px) {
    .btns { gap: 12px; }
    button { font-size: 30px; }
  }
</style>
</head>

<body oncontextmenu="return false;">
<div class="app-container">
  <div class="disp-container">
    <div class="disp" id="disp">0</div>
  </div>
  
  <div class="btns">
    <button class="g" ontouchstart="reset()">AC</button>
    <button class="g" ontouchstart="neg()">+/-</button>
    <button class="g" ontouchstart="pct()">%</button>
    <button class="o" ontouchstart="op('/')">÷</button>

    <button class="d" ontouchstart="digit('7')">7</button>
    <button class="d" ontouchstart="digit('8')">8</button>
    <button class="d" ontouchstart="digit('9')">9</button>
    <button class="o" ontouchstart="op('×')">×</button>

    <button class="d" ontouchstart="digit('4')">4</button>
    <button class="d" ontouchstart="digit('5')">5</button>
    <button class="d" ontouchstart="digit('6')">6</button>
    <button class="o" ontouchstart="op('-')">-</button>

    <button class="d" ontouchstart="digit('1')">1</button>
    <button class="d" ontouchstart="digit('2')">2</button>
    <button class="d" ontouchstart="digit('3')">3</button>
    <button class="o" ontouchstart="op('+')">+</button>

    <button class="d z" ontouchstart="digit('0')">0</button>
    <button class="d" ontouchstart="digit('.')">.</button>

    <button class="o" ontouchstart="holdStart(event)" ontouchend="holdEnd(event)">＝</button>
  </div>
</div>

<script>
let disp = document.getElementById('disp');
let display = '0';
let savedSum = null;
let holdTimer = null;
let isLongHold = false;

// 新特性：点击屏幕数字可直接复制
disp.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(display).then(() => {
      const originalColor = disp.style.color;
      disp.style.color = '#4ade80'; // 闪烁一下绿色
      setTimeout(() => { disp.style.color = originalColor; }, 150);
    });
  }
});

function updateFontSize() {
  const len = display.length;
  if (len > 9) {
    disp.style.fontSize = '40px';
  } else if (len > 6) {
    disp.style.fontSize = '55px';
  } else {
    disp.style.fontSize = '80px';
  }
}

function show() {
  disp.textContent = display || '0';
  updateFontSize();
}

function digit(n) {
  if (display === '0' && n !== '.') display = n;
  else if (display.length < 15) display += n;
  show();
}

function reset() {
  display = '0';
  savedSum = null;
  isLongHold = false;
  show();
}

function neg() {
  if (display === '0') return;
  display = display.startsWith('-') ? display.slice(1) : '-' + display;
  show();
}

function pct() {
  let n = parseFloat(display);
  if (!isNaN(n)) {
    display = parseFloat((n / 100).toFixed(8)).toString();
    show();
  }
}

function op(operator) {
  if (/[+\-×÷]$/.test(display)) {
    display = display.slice(0,-1) + operator;
  } else {
    display += operator;
  }
  show();
}

function getDateNumber() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate().toString().padStart(2, '0');
  const h = now.getHours().toString().padStart(2, '0');
  const min = now.getMinutes().toString().padStart(2, '0');
  return parseInt(`${m}${d}${h}${min}`, 10);
}

function holdStart(e) {
  e.preventDefault();
  isLongHold = false;
  holdTimer = setTimeout(() => {
    isLongHold = true;
    if (savedSum !== null) {
      const dateNum = getDateNumber();
      const diff = dateNum - savedSum;
      display = `${savedSum} + ${diff}`;
      show();
    }
  }, 800);
}

function holdEnd(e) {
  e.preventDefault();
  clearTimeout(holdTimer);
  
  if (isLongHold) {
    isLongHold = false;
    return;
  }

  if (savedSum === null) {
    try {
      let result = eval(display.replace(/×/g,'*').replace(/÷/g,'/'));
      if (Number.isFinite(result)) {
        display = Math.round(result).toString();
        savedSum = Math.round(result);
        show();
      }
    } catch {
      display = '错误';
      show();
    }
  } else {
    display = getDateNumber().toString();
    show();
  }
}

// 屏蔽浏览器的多指手势干扰
document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
document.addEventListener('dblclick', function(e) { e.preventDefault(); });

show();
</script>
</body>
</html>
